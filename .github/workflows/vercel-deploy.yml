name: Vercel Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  HAS_VERCEL_SECRETS: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        if: env.HAS_VERCEL_SECRETS != 'true'
        run: echo "Skipping preview deploy because VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID are not all configured."

      - name: Setup Node
        if: env.HAS_VERCEL_SECRETS == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npm ci

      - name: Pull Vercel project settings (preview)
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        if: env.HAS_VERCEL_SECRETS != 'true'
        run: echo "Skipping production deploy because VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID are not all configured."

      - name: Setup Node
        if: env.HAS_VERCEL_SECRETS == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npm ci

      - name: Pull Vercel project settings (production)
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Production
        if: env.HAS_VERCEL_SECRETS == 'true'
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
